<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
 
  {%- include head.html -%}
  
  
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="{{ site.baseurl }}/assets/js/jekyll-search.jquery.js"></script> 
  <body>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet"> 
    
    {%- include views/header.html -%}

    {% include sidebar.html %}

    {%- include views/banner.html -%}

    {%- include extensions/hashlocate.html -%}

    {%- include extensions/click-to-top.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include views/footer.html -%}

    <script>
window.onload = function () {
  const btn = document.getElementById("menu-btn");
  const sidebar = document.getElementById("sidebar");

  if (!btn || !sidebar) {
    console.log("menu not found");
    return;
  }

  btn.onclick = function () {
    sidebar.classList.toggle("active");
    btn.textContent = sidebar.classList.contains("active") ? "✕" : "☰";
  };
};
</script>

  </body>
</html>
