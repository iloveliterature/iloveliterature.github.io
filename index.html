<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>My Site</title>

  <style>
    .sidebar {
      position: fixed;
      left: -250px;
      top: 0;
      width: 250px;
      height: 100%;
      background: #222;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 15px;
      text-decoration: none;
    }

    .sidebar.active {
      left: 0;
    }

    #menu-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 24px;
      z-index: 1000;
    }
  </style>
</head>

<body>

  <button id="menu-btn">☰</button>

  <div id="sidebar" class="sidebar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#research">Research</a>
  </div>

  <div class="content">
    <h1>Hello</h1>
  </div>

  <script>
    const btn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");

    btn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
    });
  </script>

</body>
</html>
